<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minou Code 🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260418d">
  <!-- Libs CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Écran sélection niveaux -->
  <section id="screen-select" class="screen active">
    <div class="select-content">
      <h1><span class="title-cat">🐱</span> Minou Code</h1>
      <p id="welcome-message"></p>
      <div id="level-grid"></div>
    </div>
    <div class="select-deco">
      <span class="deco-paw">🐾</span>
      <span class="deco-fish">🐟</span>
      <span class="deco-yarn">🧶</span>
      <span class="deco-star">⭐</span>
    </div>
  </section>

  <!-- Écran jeu -->
  <section id="screen-game" class="screen">
    <header id="game-header">
      <button id="btn-back" aria-label="Retour">🏠</button>
      <span id="level-title"></span>
    </header>

    <div id="game-area">
      <div id="grid-container"></div>

      <div id="bottom-panel">
        <div id="program-zone">
          <div class="panel-label">📋 Mon programme</div>
          <div id="program-list"></div>
        </div>
        <div id="card-tray">
          <div class="panel-label">🎴 Mes cartes</div>
          <div id="tray-cards"></div>
        </div>
      </div>
    </div>

    <footer id="action-bar">
      <button id="btn-run" disabled>🚀 C'est parti !</button>
      <button id="btn-reset">🔄</button>
      <button id="btn-clear">🗑️</button>
    </footer>
  </section>

  <!-- Overlay feedback -->
  <div id="feedback-overlay" class="hidden">
    <div id="feedback-card">
      <div id="feedback-cat"></div>
      <div id="feedback-message"></div>
      <div id="feedback-stars"></div>
      <div id="feedback-actions">
        <button id="btn-next" class="hidden">Niveau suivant ! 🚀</button>
        <button id="btn-retry" class="hidden">Réessayer 💪</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=20260419a"></script>
</body>
</html>
